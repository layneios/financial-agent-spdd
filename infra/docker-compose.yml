services:
  app:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.app
    env_file:
      - path: ../.env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  ui:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.ui
    environment:
      AGENT_API_BASE_URL: "http://app:8000"
    ports:
      - "8501:8501"
    depends_on:
      app:
        condition: service_started

volumes:
  db_data:
